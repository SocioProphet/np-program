name: Catalan mu2

on:
  push:
  pull_request:

jobs:
  catalan-mu2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Validate Catalan mu2 harness and scope declarations
        run: |
          pytest -q
          python tools/validate_singularity_scope.py docs/scope/examples
